spring:
  application:
    name: lqx
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/liuqin_opera_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  sql:
    init:
      mode: always
      continue-on-error: true
jwt:
  secret: "liuqinopera"
  expire-minutes: 120
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

server:
  port: 8081

logging:
  level:
    com.lqx.opera.mapper: debug

aliyun:
  oss:
    enabled: ${ALIYUN_OSS_ENABLED:true}
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    region: ${ALIYUN_OSS_REGION:cn-beijing}
    bucket: ${ALIYUN_OSS_BUCKET:liuqinopera}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    base-path: ${ALIYUN_OSS_BASE_PATH:lqx}
